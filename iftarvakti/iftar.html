<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İftar Sayacı 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
#sky{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.vig{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 65%,transparent 25%,rgba(0,0,0,.5) 100%);z-index:1;pointer-events:none}
.wrap{position:relative;z-index:10;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:min(440px,90vw);padding:44px 44px 38px;background:rgba(6,10,20,.16);backdrop-filter:blur(32px) saturate(160%) brightness(1.05);-webkit-backdrop-filter:blur(32px) saturate(160%) brightness(1.05);border-radius:38px;border:1px solid rgba(255,255,255,.07);border-top-color:rgba(255,255,255,.2);box-shadow:0 36px 88px rgba(0,0,0,.8),0 0 0 .5px rgba(255,255,255,.05),inset 0 1px 0 rgba(255,255,255,.16);text-align:center;color:#fff}
.date-lbl{font-size:12px;font-weight:700;color:#e8c97a;letter-spacing:4.5px;text-transform:uppercase;margin-bottom:13px;text-shadow:0 0 28px rgba(232,201,122,.5)}
.status{font-size:19px;font-weight:300;letter-spacing:.6px;color:rgba(255,255,255,.85);margin-bottom:4px}
.timer{font-size:clamp(54px,10vw,78px);font-weight:800;letter-spacing:-2px;margin:10px 0;font-variant-numeric:tabular-nums;background:linear-gradient(172deg,#fff 0%,#bdd0ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(170,205,255,.3));white-space:nowrap}
.detail-box{display:flex;justify-content:space-around;background:rgba(0,0,0,.26);border-radius:24px;padding:18px;margin-top:24px;border:1px solid rgba(255,255,255,.045);box-shadow:inset 0 4px 18px rgba(0,0,0,.5)}
.d-item{display:flex;flex-direction:column;gap:5px}
.d-lbl{font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.38)}
.d-val{font-size:22px;font-weight:700;color:#fff}
.dbg{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(18px);padding:13px 30px;border-radius:50px;z-index:100;display:flex;align-items:center;gap:22px;border:1px solid rgba(255,255,255,.08);color:#fff;font-family:monospace;font-size:13px;box-shadow:0 18px 40px rgba(0,0,0,.75);white-space:nowrap}
.dbg input[type=range]{width:min(280px,45vw);accent-color:#e8c97a;cursor:pointer}
.dbg label{display:flex;align-items:center;gap:7px;cursor:pointer}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="vig"></div>
<div class="wrap">
  <div class="card">
    <div class="date-lbl" id="el-date">-- • -- • ----</div>
    <div class="status" id="el-status">Yükleniyor</div>
    <div class="timer" id="el-timer">--:--:--</div>
    <div class="detail-box">
      <div class="d-item"><span class="d-lbl">İMSAK</span><span class="d-val" id="el-imsak">--:--</span></div>
      <div class="d-item"><span class="d-lbl">İFTAR</span><span class="d-val" id="el-iftar">--:--</span></div>
    </div>
  </div>
</div>
<div class="dbg" id="dbg">
  <label><input type="checkbox" id="dbgOn"> Manuel Saat</label>
  <input type="range" id="dbgSlider" min="0" max="24" step="0.004" value="21.5" disabled>
  <span id="dbgLbl" style="min-width:48px;font-weight:700">21:30</span>
</div>
<script>
const CV=document.getElementById('sky');
const cx=CV.getContext('2d',{alpha:false,willReadFrequently:false});
const dbgOn=document.getElementById('dbgOn');
const dbgSlider=document.getElementById('dbgSlider');
const dbgLbl=document.getElementById('dbgLbl');
let W,H,HZ,tick=0;

class Perlin{
  constructor(){
    this.p=[];
    for(let i=0;i<256;i++)this.p[i]=i;
    for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.p[i],this.p[j]]=[this.p[j],this.p[i]];}
    this.p=this.p.concat(this.p);
  }
  f(t){return t*t*t*(t*(t*6-15)+10)}
  l(a,b,t){return a+t*(b-a)}
  g(h,x,y){const u=h<2?x:y,v=h<2?y:x;return((h&1)?-u:u)+((h&2)?-v:v)}
  n(x,y){
    const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
    const xf=x-Math.floor(x),yf=y-Math.floor(y);
    const u=this.f(xf),v=this.f(yf);
    const aa=this.p[this.p[xi]+yi],ab=this.p[this.p[xi]+yi+1];
    const ba=this.p[this.p[xi+1]+yi],bb=this.p[this.p[xi+1]+yi+1];
    return this.l(this.l(this.g(aa,xf,yf),this.g(ba,xf-1,yf),u),this.l(this.g(ab,xf,yf-1),this.g(bb,xf-1,yf-1),u),v);
  }
  fbm(x,y,oct){
    let v=0,a=1,f=1,m=0;
    for(let i=0;i<oct;i++){v+=a*this.n(x*f,y*f);m+=a;a*=.5;f*=2.1;}
    return v/m;
  }
}
const P=new Perlin();

const lerp=(a,b,t)=>a+(b-a)*Math.max(0,Math.min(1,t));
const lC=(a,b,t)=>[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];
const rgb=c=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const ss=(e0,e1,x)=>{const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t)};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

let stars=[],nebulae=[],starClusters=[],clouds=[],birds=[],cityTrees=[],cityLights=[],cityBuildings=[];
let shooters=[],auroraPoints=[],dustMotes=[];
let grainPat=null,moonCanvas=null;
let moonR_global=0;

const CRATERS=[
  {ox:.26,oy:-.10,r:.095,d:.62},{ox:-.36,oy:.26,r:.068,d:.50},{ox:.07,oy:-.46,r:.058,d:.40},
  {ox:-.17,oy:-.17,r:.038,d:.30},{ox:.46,oy:-.26,r:.048,d:.46},{ox:-.56,oy:.03,r:.078,d:.36},
  {ox:.01,oy:.53,r:.088,d:.50},{ox:.36,oy:.40,r:.033,d:.27},{ox:-.27,oy:.46,r:.038,d:.24},
  {ox:.56,oy:.11,r:.048,d:.40},{ox:-.07,oy:.21,r:.028,d:.20},{ox:.17,oy:.30,r:.023,d:.18},
  {ox:-.46,oy:-.36,r:.048,d:.33},{ox:.30,oy:-.40,r:.038,d:.28},{ox:-.20,oy:.60,r:.033,d:.23},
  {ox:.12,oy:.12,r:.022,d:.18},{ox:-.30,oy:-.05,r:.032,d:.25},{ox:.40,oy:-.08,r:.028,d:.22},
  {ox:-.14,oy:.40,r:.025,d:.19},{ox:.22,oy:-.28,r:.033,d:.26},
];

const MARIA=[
  {ox:.10,oy:-.07,rx:.40,ry:.26,a:.095},{ox:.30,oy:.20,rx:.26,ry:.20,a:.085},
  {ox:.40,oy:.46,rx:.20,ry:.16,a:.075},{ox:-.07,oy:.26,rx:.30,ry:.16,a:.065},
  {ox:.07,oy:.56,rx:.16,ry:.12,a:.068},{ox:-.26,oy:-.26,rx:.16,ry:.11,a:.052},
  {ox:-.40,oy:.16,rx:.14,ry:.09,a:.048},{ox:.20,oy:-.33,rx:.13,ry:.09,a:.048},
  {ox:.52,oy:.30,rx:.10,ry:.08,a:.04},{ox:-.50,oy:-.10,rx:.12,ry:.07,a:.038},
];

function buildGrain(){
  const oc=document.createElement('canvas');
  oc.width=oc.height=512;
  const ox=oc.getContext('2d');
  const id=ox.createImageData(512,512);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()*255;
    id.data[i]=id.data[i+1]=id.data[i+2]=v;
    id.data[i+3]=7;
  }
  ox.putImageData(id,0,0);
  grainPat=cx.createPattern(oc,'repeat');
}

function buildMoon(){
  const R=52;
  moonR_global=R;
  const SZ=R*6;
  const oc=document.createElement('canvas');
  oc.width=oc.height=SZ;
  const ox=oc.getContext('2d');
  const ocx=SZ/2,ocy=SZ/2;

  const surf=ox.createRadialGradient(ocx-R*.2,ocy-R*.25,0,ocx,ocy,R);
  surf.addColorStop(0,'rgba(252,253,248,1)');
  surf.addColorStop(.2,'rgba(242,246,254,1)');
  surf.addColorStop(.52,'rgba(212,226,246,1)');
  surf.addColorStop(.78,'rgba(186,203,234,1)');
  surf.addColorStop(.92,'rgba(168,188,222,1)');
  surf.addColorStop(1,'rgba(148,170,210,1)');
  ox.fillStyle=surf;
  ox.beginPath();ox.arc(ocx,ocy,R,0,Math.PI*2);ox.fill();

  MARIA.forEach(m=>{
    const mg=ox.createRadialGradient(ocx+m.ox*R,ocy+m.oy*R,0,ocx+m.ox*R,ocy+m.oy*R,m.rx*R);
    mg.addColorStop(0,`rgba(98,118,158,${m.a})`);
    mg.addColorStop(.6,`rgba(108,128,165,${m.a*.55})`);
    mg.addColorStop(1,'rgba(0,0,0,0)');
    ox.fillStyle=mg;
    ox.save();
    ox.translate(ocx+m.ox*R,ocy+m.oy*R);
    ox.scale(m.rx,m.ry);
    ox.beginPath();ox.arc(0,0,R,0,Math.PI*2);ox.fill();
    ox.restore();
  });

  for(let i=0;i<180;i++){
    const angle=Math.random()*Math.PI*2;
    const dist=Math.pow(Math.random(),.55)*R*.96;
    const px=ocx+Math.cos(angle)*dist,py=ocy+Math.sin(angle)*dist;
    const cr=.8+Math.random()*2.5;
    const bright=Math.random()>.6;
    ox.fillStyle=bright?`rgba(245,248,255,${.04+Math.random()*.08})`:`rgba(80,95,125,${.02+Math.random()*.05})`;
    ox.beginPath();ox.arc(px,py,cr,0,Math.PI*2);ox.fill();
  }

  CRATERS.forEach(c=>{
    const cx2=ocx+c.ox*R,cy2=ocy+c.oy*R,cr=c.r*R;
    const sh=ox.createRadialGradient(cx2+cr*.2,cy2+cr*.2,0,cx2,cy2,cr*1.4);
    sh.addColorStop(0,`rgba(55,72,105,${c.d*.28})`);
    sh.addColorStop(.55,`rgba(72,90,125,${c.d*.16})`);
    sh.addColorStop(1,'rgba(0,0,0,0)');
    ox.fillStyle=sh;ox.beginPath();ox.arc(cx2,cy2,cr*1.4,0,Math.PI*2);ox.fill();

    ox.fillStyle=`rgba(72,90,128,${c.d*.32})`;
    ox.beginPath();ox.arc(cx2,cy2,cr,0,Math.PI*2);ox.fill();

    const rim=ox.createRadialGradient(cx2-cr*.28,cy2-cr*.28,0,cx2,cy2,cr*1.15);
    rim.addColorStop(0,`rgba(255,255,255,${c.d*.22})`);
    rim.addColorStop(.28,`rgba(238,244,255,${c.d*.10})`);
    rim.addColorStop(1,'rgba(0,0,0,0)');
    ox.fillStyle=rim;ox.beginPath();ox.arc(cx2,cy2,cr*1.15,0,Math.PI*2);ox.fill();

    ox.fillStyle=`rgba(185,200,225,${c.d*.14})`;
    for(let j=0;j<6;j++){
      const ea=Math.random()*Math.PI*2;
      const el=cr*(1.5+Math.random()*3.5);
      ox.save();
      ox.translate(cx2,cy2);ox.rotate(ea);
      ox.fillRect(-.4,0,.8,el);
      ox.restore();
    }
  });

  const limb=ox.createRadialGradient(ocx,ocy,R*.4,ocx,ocy,R);
  limb.addColorStop(0,'rgba(0,0,0,0)');
  limb.addColorStop(.65,'rgba(0,0,0,0)');
  limb.addColorStop(.88,'rgba(0,6,22,.22)');
  limb.addColorStop(1,'rgba(0,6,22,.52)');
  ox.fillStyle=limb;ox.beginPath();ox.arc(ocx,ocy,R,0,Math.PI*2);ox.fill();

  moonCanvas={c:oc,R,SZ,ocx,ocy};
}

function resize(){
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight;
  HZ=H*.73;
  initScene();
  buildGrain();
  buildMoon();
}

function initScene(){
  stars=[];
  const maxD=Math.hypot(W,H)*1.18;
  for(let i=0;i<5000;i++){
    const mag=Math.pow(Math.random(),1.8);
    const sz=mag<.6?(Math.random()*.6+.08):mag<.88?(Math.random()*1.2+.6):mag<.97?(Math.random()*1.8+1.2):(Math.random()*2.8+2.0);
    const temp=Math.random();
    const horizFactor=.2+Math.random()*.8;
    stars.push({
      angle:Math.random()*Math.PI*2,
      dist:Math.pow(Math.random(),.5)*maxD*horizFactor,
      s:sz,
      base:.08+Math.random()*.92,
      ts:.003+Math.random()*.025,
      tp:Math.random()*Math.PI*2,
      temp,
      drift:(Math.random()-.5)*.00025,
      scint:Math.random()*.4,
    });
  }

  nebulae=[];
  const nebColors=[[255,80,80],[255,120,60],[80,120,255],[160,80,255],[60,200,180]];
  for(let i=0;i<12;i++){
    const col=nebColors[Math.floor(Math.random()*nebColors.length)];
    nebulae.push({
      angle:Math.random()*Math.PI*2,
      dist:Math.pow(Math.random(),.4)*maxD*.7,
      r:40+Math.random()*120,
      col,
      base:.015+Math.random()*.04,
      shape:Math.random()*Math.PI*2,
    });
  }

  starClusters=[];
  for(let i=0;i<8;i++){
    const ca=Math.random()*Math.PI*2;
    const cd=Math.pow(Math.random(),.5)*maxD*.6;
    const cr=25+Math.random()*60;
    const cs=[];
    for(let j=0;j<30+Math.floor(Math.random()*40);j++){
      cs.push({
        ox:(Math.random()-.5)*cr*2,
        oy:(Math.random()-.5)*cr*2,
        s:.3+Math.random()*.8,
        a:.2+Math.random()*.7,
      });
    }
    starClusters.push({angle:ca,dist:cd,r:cr,stars:cs});
  }

  shooters=[];
  for(let i=0;i<6;i++)shooters.push(mkShooter());

  cityTrees=[];
  for(let i=-W;i<=W;i+=28){
    if(Math.random()>.55)continue;
    if(Math.abs(i)>120&&Math.abs(i)<295)continue;
    cityTrees.push({dx:i,s:12+Math.random()*32,tilt:(Math.random()-.5)*.18,variation:Math.random()});
  }

  cityBuildings=[];
  for(let i=0;i<W+200;i+=Math.floor(15+Math.random()*35)){
    const bh=8+Math.pow(Math.random(),1.5)*95;
    const bw=12+Math.random()*32;
    cityBuildings.push({x:i-100,w:bw,h:bh,wRows:Math.floor(bh/12),wCols:Math.floor(bw/9)});
  }

  cityLights=[];
  cityBuildings.forEach(b=>{
    for(let wy=8;wy<b.h-6;wy+=12){
      for(let wx=b.x+5;wx<b.x+b.w-5;wx+=9){
        if(Math.random()>.42){
          cityLights.push({x:wx,dy:wy,w:140+Math.random()*115,ba:.25+Math.random()*.75,sp:.006+Math.random()*.032,ph:Math.random()*Math.PI*2,onChance:Math.random()});
        }
      }
    }
  });

  clouds=[];
  for(let i=0;i<22;i++){
    const stratus=Math.random()>.65;
    const c={
      x:Math.random()*W*1.7-W*.35,
      y:(stratus?12:60)+Math.random()*(HZ*.52),
      bw:stratus?520+Math.random()*950:160+Math.random()*440,
      bh:stratus?14+Math.random()*26:36+Math.random()*88,
      spd:.018+Math.random()*.055,
      op:stratus?.10:.20+Math.random()*.45,
      stratus,puffs:[],
      lightShift:Math.random(),
    };
    const np=stratus?3:6+Math.floor(Math.random()*10);
    for(let j=0;j<np;j++){
      c.puffs.push({
        ox:(Math.random()-.5)*c.bw*.85,
        oy:(Math.random()-.5)*c.bh*.45,
        r:c.bh*(.45+Math.random()*.9),
      });
    }
    clouds.push(c);
  }

  birds=[];
  for(let i=0;i<15;i++){
    birds.push({
      x:Math.random()*W,y:40+Math.random()*(HZ*.46),
      spd:.32+Math.random()*.92,
      wp:Math.random()*Math.PI*2,
      ws:.085+Math.random()*.095,
      sz:1.6+Math.random()*3.4,
      fd:.7+Math.random()*.58,
    });
  }

  auroraPoints=[];
  for(let i=0;i<8;i++){
    auroraPoints.push({
      x:Math.random()*W,
      y:HZ*.15+Math.random()*HZ*.25,
      w:200+Math.random()*400,
      phase:Math.random()*Math.PI*2,
      speed:.008+Math.random()*.015,
      hue:100+Math.random()*80,
    });
  }
}

function mkShooter(){
  return{
    x:Math.random()*W*1.4,y:-20+Math.random()*HZ*.35,
    vx:-(2.5+Math.random()*6),vy:1.2+Math.random()*3.5,
    len:70+Math.random()*160,life:0,maxLife:55+Math.random()*90,
    delay:Math.random()*800,trail:[],brightness:.7+Math.random()*.3,
  };
}

window.addEventListener('resize',resize);
resize();

function skyPal(t){
  const ph=[
    {t:0,   top:[1,2,6],        mid:[3,5,11],       bot:[5,9,20]},
    {t:3.8, top:[2,3,9],        mid:[5,8,20],        bot:[10,14,30]},
    {t:4.5, top:[4,6,18],       mid:[12,14,35],      bot:[25,22,52]},
    {t:5.0, top:[8,11,28],      mid:[38,22,50],      bot:[95,38,52]},
    {t:5.5, top:[16,24,58],     mid:[128,58,58],     bot:[245,108,42]},
    {t:6.0, top:[22,32,72],     mid:[168,82,62],     bot:[255,148,52]},
    {t:6.5, top:[32,68,148],    mid:[178,138,105],   bot:[255,208,125]},
    {t:7.2, top:[26,80,210],    mid:[85,155,235],    bot:[155,205,255]},
    {t:9.5, top:[18,68,205],    mid:[65,148,235],    bot:[148,205,255]},
    {t:12,  top:[14,58,195],    mid:[58,140,232],    bot:[140,202,255]},
    {t:15,  top:[20,64,188],    mid:[65,138,222],    bot:[138,192,252]},
    {t:16.5,top:[26,68,178],    mid:[92,128,178],    bot:[182,168,128]},
    {t:17.2,top:[35,65,158],    mid:[138,118,148],   bot:[228,178,108]},
    {t:17.8,top:[45,45,105],    mid:[192,88,58],     bot:[255,128,18]},
    {t:18.3,top:[30,22,68],     mid:[148,40,50],     bot:[255,78,10]},
    {t:18.9,top:[18,15,50],     mid:[85,28,45],      bot:[165,42,25]},
    {t:19.5,top:[10,10,35],     mid:[38,20,40],      bot:[72,25,22]},
    {t:20.2,top:[4,6,20],       mid:[12,13,32],      bot:[22,15,32]},
    {t:22,  top:[1,2,6],        mid:[3,5,11],        bot:[5,9,20]},
    {t:24,  top:[1,2,6],        mid:[3,5,11],        bot:[5,9,20]},
  ];
  let i=0;while(i<ph.length-1&&ph[i+1].t<t)i++;
  if(i>=ph.length-1)i=ph.length-2;
  const f=ss(0,1,(t-ph[i].t)/(ph[i+1].t-ph[i].t));
  return{top:lC(ph[i].top,ph[i+1].top,f),mid:lC(ph[i].mid,ph[i+1].mid,f),bot:lC(ph[i].bot,ph[i+1].bot,f)};
}

function sunPos(t){
  if(t<4.5||t>20.5)return null;
  const p=(t-4.85)/14.4;
  const a=Math.PI*(1-p);
  return{x:W*.5-Math.cos(a)*W*.47,y:HZ-Math.sin(a)*(HZ*.90),alt:Math.sin(a),p,t};
}

function moonPos(t){
  const mt=t<5.5?t+24:t;
  if(mt>5.5&&mt<17.5)return null;
  const p=(mt-17.5)/13.8;
  const a=Math.PI*(1-p);
  return{x:W*.5-Math.cos(a)*W*.43,y:HZ-Math.sin(a)*(HZ*.90),alt:Math.sin(a)};
}

function drawAtmosphere(t){
  const pal=skyPal(t);
  const g=cx.createLinearGradient(0,0,0,HZ);
  g.addColorStop(0,rgb(pal.top));
  g.addColorStop(.22,rgb(lC(pal.top,pal.mid,.38)));
  g.addColorStop(.52,rgb(pal.mid));
  g.addColorStop(.78,rgb(lC(pal.mid,pal.bot,.6)));
  g.addColorStop(1,rgb(pal.bot));
  cx.fillStyle=g;cx.fillRect(0,0,W,HZ);

  const sun=sunPos(t);
  if(sun){
    const horizProx=Math.max(0,1-Math.abs(sun.alt)/.35);
    if(horizProx>0){
      const mieG=cx.createRadialGradient(sun.x,sun.y,0,sun.x,sun.y,W*.72);
      mieG.addColorStop(0,`rgba(255,195,95,${horizProx*.62})`);
      mieG.addColorStop(.12,`rgba(255,140,42,${horizProx*.38})`);
      mieG.addColorStop(.32,`rgba(255,80,18,${horizProx*.18})`);
      mieG.addColorStop(.6,`rgba(200,40,8,${horizProx*.06})`);
      mieG.addColorStop(1,'rgba(0,0,0,0)');
      cx.globalCompositeOperation='screen';
      cx.fillStyle=mieG;cx.fillRect(0,0,W,HZ);
      cx.globalCompositeOperation='source-over';
    }

    if(sun.alt>-.05&&sun.alt<.38){
      const crRays=cx.createRadialGradient(sun.x,HZ,0,sun.x,HZ,W*.9);
      crRays.addColorStop(0,`rgba(255,${lerp(80,200,sun.alt/.38)|0},20,${ss(-.05,.15,sun.alt)*.22})`);
      crRays.addColorStop(.3,`rgba(255,${lerp(60,160,sun.alt/.38)|0},10,${ss(-.05,.15,sun.alt)*.08})`);
      crRays.addColorStop(1,'rgba(0,0,0,0)');
      cx.globalCompositeOperation='screen';
      cx.fillStyle=crRays;cx.fillRect(0,0,W,HZ);
      cx.globalCompositeOperation='source-over';

      for(let i=0;i<16;i++){
        const ra=(i/16)*Math.PI*2+tick*.00012;
        const rl=(W*.32+W*.18*Math.sin(tick*.004+i*1.7))*ss(-.05,.38,sun.alt);
        const rg=cx.createLinearGradient(sun.x,sun.y,sun.x+Math.cos(ra)*rl,sun.y+Math.sin(ra)*rl);
        rg.addColorStop(0,`rgba(255,200,100,${.04*ss(-.05,.38,sun.alt)})`);
        rg.addColorStop(1,'rgba(0,0,0,0)');
        cx.globalCompositeOperation='screen';
        cx.fillStyle=rg;cx.lineWidth=12+6*Math.sin(tick*.006+i*2.3);cx.strokeStyle=rg;
        cx.beginPath();cx.moveTo(sun.x,sun.y);cx.lineTo(sun.x+Math.cos(ra)*rl,sun.y+Math.sin(ra)*rl);cx.stroke();
        cx.globalCompositeOperation='source-over';
      }
    }
  }

  const nightFade=t>18?(t-18)/2.5:t<4.5?1:t<5.5?(5.5-t)/1:0;
  if(nightFade>0){
    const hazeG=cx.createLinearGradient(0,0,0,HZ);
    hazeG.addColorStop(0,'rgba(0,0,0,0)');
    hazeG.addColorStop(.55,'rgba(0,0,0,0)');
    hazeG.addColorStop(1,`rgba(2,5,18,${nightFade*.18})`);
    cx.fillStyle=hazeG;cx.fillRect(0,0,W,HZ);
  }

  const sunH=sunPos(t);
  if(!sunH&&(t>6&&t<18)){
    const hazeH=cx.createLinearGradient(0,HZ*.55,0,HZ);
    hazeH.addColorStop(0,'rgba(180,210,255,0)');
    hazeH.addColorStop(1,'rgba(180,210,255,.06)');
    cx.fillStyle=hazeH;cx.fillRect(0,HZ*.55,W,HZ*.45);
  }

  if(t>16.5&&t<20.5){
    const bov=ss(16.5,17.5,t)*ss(20.5,19.5,t);
    const antisolar=W-((sunH?sunH.x:W/2));
    const beltG=cx.createLinearGradient(0,HZ*.6,0,HZ);
    beltG.addColorStop(0,'rgba(0,0,0,0)');
    beltG.addColorStop(.35,`rgba(200,160,220,${bov*.12})`);
    beltG.addColorStop(.65,`rgba(160,120,180,${bov*.08})`);
    beltG.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=beltG;cx.fillRect(0,HZ*.6,W,HZ*.4);
  }
}

function drawMilkyWay(t){
  let op=0;
  if(t<4.8||t>20)op=1;
  else if(t<=5.8)op=ss(4.8,5.8,t);
  else if(t>=19)op=ss(20,19,t);
  if(op<=0)return;

  cx.save();
  cx.globalCompositeOperation='screen';

  const bandAngle=t*.042-.38+tick*.000008;
  cx.translate(W/2,HZ*.22);
  cx.rotate(bandAngle);

  const bandW=W*.48;
  const bandH=H*1.4;

  const core=cx.createRadialGradient(bandW*.12,bandH*.15,0,bandW*.12,bandH*.15,bandW*.55);
  core.addColorStop(0,`rgba(255,240,195,${op*.32})`);
  core.addColorStop(.08,`rgba(255,210,140,${op*.22})`);
  core.addColorStop(.18,`rgba(220,170,100,${op*.14})`);
  core.addColorStop(.4,`rgba(160,120,80,${op*.07})`);
  core.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=core;
  cx.fillRect(-W,0-bandH*.3,W*2,bandH);

  for(let band=0;band<4;band++){
    const bx=(-bandW*.5+band*bandW*.35);
    const bw=bandW*(.2+band*.08);
    const bg=cx.createLinearGradient(bx,0,bx+bw,0);
    bg.addColorStop(0,'rgba(0,0,0,0)');
    bg.addColorStop(.25,`rgba(${120+band*18},${100+band*15},${180+band*12},${op*(.15-band*.025)})`);
    bg.addColorStop(.5,`rgba(${150+band*20},${130+band*18},${200+band*10},${op*(.22-band*.035)})`);
    bg.addColorStop(.75,`rgba(${120+band*18},${100+band*15},${180+band*12},${op*(.15-band*.025)})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=bg;
    cx.fillRect(bx,-bandH*.5,bw,bandH*1.2);
  }

  for(let i=0;i<6;i++){
    const dl=cx.createLinearGradient(-bandW*.4+i*bandW*.18,-bandH*.1,-bandW*.4+i*bandW*.18+20,bandH*.4);
    dl.addColorStop(0,'rgba(0,0,0,0)');
    dl.addColorStop(.3,`rgba(0,0,0,${op*(.04+i*.008)})`);
    dl.addColorStop(.7,`rgba(0,0,0,${op*(.06+i*.01)})`);
    dl.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=dl;
    cx.fillRect(-bandW*.4+i*bandW*.18,-bandH*.1,25,bandH*.55);
  }

  for(let i=0;i<5;i++){
    const nx=-bandW*.3+i*bandW*.18;
    const ny=P.n(i*.4,tick*.0001)*bandH*.2;
    const nr=35+Math.random()*55;
    const nColors=[[255,60,80],[80,140,255],[255,140,60],[160,60,255]];
    const nc=nColors[i%nColors.length];
    const ng=cx.createRadialGradient(nx,ny,0,nx,ny,nr);
    ng.addColorStop(0,`rgba(${nc[0]},${nc[1]},${nc[2]},${op*.08})`);
    ng.addColorStop(.5,`rgba(${nc[0]},${nc[1]},${nc[2]},${op*.04})`);
    ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.beginPath();cx.arc(nx,ny,nr,0,Math.PI*2);cx.fill();
  }

  cx.globalCompositeOperation='source-over';
  cx.restore();
}

function drawStarClusters(t){

  const ocx2=W/2,ocy2=HZ;
  starClusters.forEach(cl=>{
    const a=cl.angle+tick*.000006;
    const clx=ocx2+Math.cos(a)*cl.dist,cly=ocy2-Math.sin(a)*Math.abs(cl.dist)*.85;
    if(cly>HZ+cl.r||cly<-cl.r)return;
    cl.stars.forEach(s=>{
      const sx=clx+s.ox,sy=cly+s.oy;
      if(sy>HZ||sy<0||sx<0||sx>W)return;
      cx.fillStyle=`rgba(255,248,228,${s.a*op})`;
      cx.beginPath();cx.arc(sx,sy,s.s,0,Math.PI*2);cx.fill();
    });
  });

function drawStars(t){
  let op=0;
  if(t<4.8||t>19.8)op=1;
  else if(t<=6.2)op=1-ss(4.8,6.2,t);
  else if(t>=18.5)op=ss(18.5,19.8,t);
  if(op<=0)return;

  const ocx2=W/2,ocy2=HZ;
  stars.forEach(s=>{
    s.tp+=s.ts;
    s.angle+=s.drift;
    const sx=ocx2+Math.cos(s.angle)*s.dist;
    const sy=ocy2-Math.sin(s.angle)*s.dist;
    if(sy>HZ||sy<0||sx<0||sx>W)return;

    const horizDist=1-clamp((HZ-sy)/HZ,0,1);
    const scintAmt=s.scint*horizDist*horizDist;
    const twk=clamp(.22+.78*Math.abs(Math.sin(s.tp))+scintAmt*Math.sin(s.tp*3.7),.05,1.05);
    const al=s.base*twk*op;

    let r,g,b;
    if(s.temp<.08){r=155;g=175;b=255;}
    else if(s.temp<.22){r=170;g=195;b=255;}
    else if(s.temp<.45){r=210;g=228;b=255;}
    else if(s.temp<.62){r=248,g=250,b=255;}
    else if(s.temp<.75){r=255;g=252;b=235;}
    else if(s.temp<.88){r=255;g=228;b=172;}
    else{r=255;g=178;b=108;}

    cx.fillStyle=`rgba(${r},${g},${b},${clamp(al,0,1)})`;
    cx.beginPath();cx.arc(sx,sy,s.s,0,Math.PI*2);cx.fill();

    if(s.s>1.4){
      cx.fillStyle=`rgba(${r},${g},${b},${clamp(al*.12,0,.15)})`;
      cx.beginPath();cx.arc(sx,sy,s.s*3.8,0,Math.PI*2);cx.fill();
    }

    if(s.s>2.2){
      cx.save();cx.translate(sx,sy);cx.globalCompositeOperation='screen';
      for(let k=0;k<4;k++){
        const sa=Math.PI/4*k+tick*.00015;
        const sl=s.s*(5+Math.sin(s.tp*.8)*2);
        const sg=cx.createLinearGradient(0,-sl,0,sl);
        sg.addColorStop(0,'rgba(255,255,255,0)');
        sg.addColorStop(.5,`rgba(${r},${g},${b},${clamp(al*.35,0,.4)})`);
        sg.addColorStop(1,'rgba(255,255,255,0)');
        cx.save();cx.rotate(sa);cx.fillStyle=sg;cx.fillRect(-s.s*.22,-sl,s.s*.44,sl*2);cx.restore();
      }
      cx.globalCompositeOperation='source-over';cx.restore();
    }
  });
}

function drawShooters(t){
  let op=0;
  if(t<4.8||t>20)op=1;
  else if(t>=19.2)op=(t-19.2)/.8;
  if(op<=0)return;

  shooters.forEach(s=>{
    if(s.delay>0){s.delay--;return;}
    s.life++;
    if(s.life>=s.maxLife){Object.assign(s,mkShooter());return;}
    const pr=s.life/s.maxLife;
    const fa=pr<.2?pr/.2:pr>.72?(1-pr)/.28:1;
    s.x+=s.vx;s.y+=s.vy;
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>Math.floor(s.len/Math.hypot(s.vx,s.vy)))s.trail.shift();

    if(s.trail.length>1){
      for(let i=1;i<s.trail.length;i++){
        const tp=i/s.trail.length;
        const tg=cx.createLinearGradient(s.trail[i-1].x,s.trail[i-1].y,s.trail[i].x,s.trail[i].y);
        tg.addColorStop(0,`rgba(200,220,255,${fa*op*tp*.28*s.brightness})`);
        tg.addColorStop(1,`rgba(255,255,255,${fa*op*tp*.55*s.brightness})`);
        cx.strokeStyle=tg;cx.lineWidth=1.1;
        cx.beginPath();cx.moveTo(s.trail[i-1].x,s.trail[i-1].y);cx.lineTo(s.trail[i].x,s.trail[i].y);cx.stroke();
      }
    }

    const hg=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,10);
    hg.addColorStop(0,`rgba(255,255,255,${fa*op*.88*s.brightness})`);
    hg.addColorStop(.4,`rgba(200,225,255,${fa*op*.35*s.brightness})`);
    hg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=hg;cx.beginPath();cx.arc(s.x,s.y,10,0,Math.PI*2);cx.fill();
  });
}

function drawSun(t){
  const sun=sunPos(t);
  if(!sun||sun.alt<=-0.14)return;
  const{x:sx,y:sy,alt}=sun;
  const it=ss(-.14,.3,alt);
  const sr=255,sg=lerp(68,240,it)|0,sb=lerp(0,215,it)|0;

  cx.save();
  cx.globalCompositeOperation='screen';
  const big=cx.createRadialGradient(sx,sy,0,sx,sy,W*.7);
  big.addColorStop(0,`rgba(${sr},${sg},${sb},${.52*it})`);
  big.addColorStop(.14,`rgba(${sr},${Math.max(0,sg-48)|0},2,${.20*it})`);
  big.addColorStop(.38,`rgba(${sr},${Math.max(0,sg-75)|0},0,${.065*it})`);
  big.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=big;cx.fillRect(0,0,W,HZ);

  cx.save();cx.translate(sx,sy);
  for(let i=0;i<40;i++){
    const a=(Math.PI*2*i/40)+tick*.00022;
    const rl=(380+220*Math.sin(tick*.0042+i*1.85))*it;
    const rw=14+7*Math.sin(tick*.0078+i*2.4);
    cx.rotate(a);
    const rg=cx.createLinearGradient(0,0,0,rl);
    rg.addColorStop(0,`rgba(${sr},${sg},${sb},${.048*it})`);
    rg.addColorStop(.4,`rgba(${sr},${sg},${sb},${.022*it})`);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=rg;
    cx.beginPath();cx.moveTo(-rw,0);cx.lineTo(rw,0);cx.lineTo(rw*4.5,rl);cx.lineTo(-rw*4.5,rl);cx.fill();
    cx.rotate(-a);
  }
  cx.restore();

  const disk=cx.createRadialGradient(sx-8,sy-8,0,sx,sy,48);
  disk.addColorStop(0,'rgba(255,255,255,1)');
  disk.addColorStop(.3,'rgba(255,252,220,1)');
  disk.addColorStop(.7,`rgba(${sr},${sg},${sb},.8)`);
  disk.addColorStop(1,`rgba(${sr},${sg},${sb},0)`);
  cx.fillStyle=disk;cx.beginPath();cx.arc(sx,sy,50,0,Math.PI*2);cx.fill();

  cx.globalCompositeOperation='source-over';

  if(it>.05){
    cx.globalCompositeOperation='screen';
    const dx=W/2-sx,dy=H/2-sy;
    const dist=Math.hypot(dx,dy),dir=Math.atan2(dy,dx);
    [{d:.20,s:48,c:'135,192,255',a:.032},{d:.46,s:16,c:'255,142,45',a:.052},
     {d:.80,s:85,c:'92,245,142',a:.018},{d:1.15,s:35,c:'255,92,242',a:.026},
     {d:1.48,s:128,c:'255,195,88',a:.016},{d:-.26,s:24,c:'255,255,255',a:.068},
     {d:.62,s:55,c:'255,255,200',a:.012}
    ].forEach(f=>{
      const fx=sx+Math.cos(dir)*dist*f.d,fy=sy+Math.sin(dir)*dist*f.d;
      const fg=cx.createRadialGradient(fx,fy,0,fx,fy,f.s);
      fg.addColorStop(0,`rgba(${f.c},${f.a*it})`);fg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=fg;cx.beginPath();cx.arc(fx,fy,f.s,0,Math.PI*2);cx.fill();
    });
    cx.globalCompositeOperation='source-over';
  }
  cx.restore();
}

function drawMoon(t){
  const moon=moonPos(t);
  if(!moon||moon.alt<=-0.14)return;
  const{x:mx,y:my,alt}=moon;
  const it=ss(-.14,.20,alt);
  const mo=moonCanvas;
  const R=mo.R,SZ=mo.SZ,mocx=mo.ocx,mocy=mo.ocy;
  const pal=skyPal(t);

  cx.save();

  cx.globalCompositeOperation='screen';

  const bigH=cx.createRadialGradient(mx,my,R*.65,mx,my,R*14);
  bigH.addColorStop(0,`rgba(172,205,255,${.09*it})`);
  bigH.addColorStop(.1,`rgba(105,150,225,${.045*it})`);
  bigH.addColorStop(.28,`rgba(65,112,192,${.016*it})`);
  bigH.addColorStop(.6,`rgba(40,80,160,${.006*it})`);
  bigH.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=bigH;cx.beginPath();cx.arc(mx,my,R*14,0,Math.PI*2);cx.fill();

  const h22=cx.createRadialGradient(mx,my,R*2.05,mx,my,R*2.65);
  h22.addColorStop(0,`rgba(195,222,255,${.09*it})`);
  h22.addColorStop(.5,`rgba(160,198,255,${.04*it})`);
  h22.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=h22;cx.beginPath();cx.arc(mx,my,R*2.65,0,Math.PI*2);cx.fill();

  cx.globalCompositeOperation='source-over';

  const tmpC=document.createElement('canvas');
  tmpC.width=SZ;tmpC.height=SZ;
  const tmpX=tmpC.getContext('2d');
  tmpX.drawImage(mo.c,0,0);

  const mt=t<5.5?t+24:t;
  const moonProg=clamp((mt-17.5)/13.8,0,1);
  const phase=.20;
  const sOX=(1-Math.cos((phase+moonProg*.10)*Math.PI*2))*R*1.38-R*.44;
  const sOY=Math.sin((phase+moonProg*.10)*Math.PI*2)*R*.20;

  const sr2=Math.round(clamp(pal.top[0]*.75,1,30));
  const sg2=Math.round(clamp(pal.top[1]*.75,1,25));
  const sb2=Math.round(clamp(pal.top[2]*1.08,8,38));

  tmpX.save();
  tmpX.beginPath();tmpX.arc(mocx,mocy,R,0,Math.PI*2);tmpX.clip();

  const shG=tmpX.createRadialGradient(mocx+sOX,mocy+sOY,0,mocx+sOX,mocy+sOY,R*1.10);
  shG.addColorStop(0,`rgba(${sr2},${sg2},${sb2},.98)`);
  shG.addColorStop(.72,`rgba(${sr2},${sg2},${sb2},.97)`);
  shG.addColorStop(.90,`rgba(${sr2},${sg2},${sb2},.6)`);
  shG.addColorStop(1,'rgba(0,0,0,0)');
  tmpX.fillStyle=shG;tmpX.fillRect(0,0,SZ,SZ);

  const termG=tmpX.createRadialGradient(mocx+sOX*.88,mocy+sOY*.88,R*.48,mocx+sOX*.88,mocy+sOY*.88,R*.74);
  termG.addColorStop(0,'rgba(0,0,0,0)');
  termG.addColorStop(.45,`rgba(${sr2},${sg2},${sb2},.20)`);
  termG.addColorStop(1,'rgba(0,0,0,0)');
  tmpX.fillStyle=termG;tmpX.fillRect(0,0,SZ,SZ);

  const esG=tmpX.createRadialGradient(mocx+sOX*.4,mocy+sOY*.4,0,mocx+sOX*.4,mocy+sOY*.4,R*.92);
  esG.addColorStop(0,'rgba(20,45,105,.065)');
  esG.addColorStop(1,'rgba(0,0,0,0)');
  tmpX.fillStyle=esG;tmpX.fillRect(0,0,SZ,SZ);
  tmpX.restore();

  tmpX.strokeStyle='rgba(210,230,255,.18)';
  tmpX.lineWidth=1.1;
  tmpX.beginPath();tmpX.arc(mocx,mocy,R-.55,0,Math.PI*2);tmpX.stroke();

  cx.globalAlpha=it;
  cx.drawImage(tmpC,mx-mocx,my-mocy);
  cx.globalAlpha=1;

  if(it>.2){
    cx.globalCompositeOperation='screen';
    const ldx=W/2-mx,ldy=H/2-my;
    const ldir=Math.atan2(ldy,ldx),ldist=Math.hypot(ldx,ldy);
    [{d:-.46,s:11,c:'88,168,255',a:.022},{d:.26,s:6.5,c:'188,212,255',a:.030},{d:1.42,s:20,c:'72,110,195',a:.016}].forEach(f=>{
      const fx=mx+Math.cos(ldir)*ldist*f.d,fy=my+Math.sin(ldir)*ldist*f.d;
      const fg=cx.createRadialGradient(fx,fy,0,fx,fy,f.s);
      fg.addColorStop(0,`rgba(${f.c},${f.a*it})`);fg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=fg;cx.beginPath();cx.arc(fx,fy,f.s,0,Math.PI*2);cx.fill();
    });
    cx.globalCompositeOperation='source-over';
  }
  cx.restore();
}

function drawClouds(t){
  const sun=sunPos(t);
  const isSS=(t>4.8&&t<7.8)||(t>16.8&&t<19.8);
  const isNight=t<4.8||t>19.8;

  clouds.forEach(c=>{
    c.x+=c.spd*(1+P.n(c.x*.0008,tick*.0001)*.3);
    if(c.x>W+c.bw)c.x=-c.bw;

    c.puffs.forEach(p=>{
      const px=c.x+p.ox,py=c.y+p.oy;
      let r=255,g=255,b=255,sr=165,sg=178,sb=192;

      if(isSS&&sun){
        const dist2=Math.hypot(px-sun.x,py-sun.y);
        const inf=Math.max(0,1-dist2/(W*.80));
        if(t>12){r=lerp(110,255,inf)|0;g=lerp(70,152,inf)|0;b=lerp(85,72,inf)|0;sr=lerp(32,168,inf)|0;sg=lerp(24,72,inf)|0;sb=lerp(42,32,inf)|0;}
        else{r=lerp(115,255,inf)|0;g=lerp(85,195,inf)|0;b=lerp(115,142,inf)|0;sr=lerp(42,142,inf)|0;sg=lerp(55,92,inf)|0;sb=lerp(72,82,inf)|0;}
      }else if(isNight){r=18;g=24;b=40;sr=6;sg=9;sb=16;}

      const gl=cx.createRadialGradient(px,py-p.r*.25,0,px,py,p.r);
      gl.addColorStop(0,`rgba(${r},${g},${b},${c.op})`);
      gl.addColorStop(.48,`rgba(${(r+sr)>>1},${(g+sg)>>1},${(b+sb)>>1},${c.op*.85})`);
      gl.addColorStop(.75,`rgba(${sr},${sg},${sb},${c.op*.65})`);
      gl.addColorStop(1,`rgba(${sr},${sg},${sb},0)`);
      cx.fillStyle=gl;cx.beginPath();
      if(c.stratus)cx.ellipse(px,py,p.r*2.4,p.r*.55,0,0,Math.PI*2);
      else cx.arc(px,py,p.r,0,Math.PI*2);
      cx.fill();
    });
  });
}

function drawBirds(t){
  if(t<5.4||t>19.3)return;
  let al=1;
  if(t<6.5)al=ss(5.4,6.5,t);
  if(t>18.3)al=ss(19.3,18.3,t);
  cx.strokeStyle=`rgba(10,12,16,${al*.82})`;cx.lineCap='round';
  birds.forEach(b=>{
    b.x+=b.spd;b.y+=Math.sin(tick*.018+b.wp)*.38;b.wp+=b.ws;
    if(b.x>W+55){b.x=-55;b.y=42+Math.random()*HZ*.44;}
    const wy=Math.sin(b.wp)*b.sz*b.fd;
    cx.lineWidth=b.sz*.55;
    cx.beginPath();
    cx.moveTo(b.x-b.sz*1.5,b.y+wy);
    cx.quadraticCurveTo(b.x-b.sz*.5,b.y-Math.abs(wy)*.75,b.x,b.y);
    cx.quadraticCurveTo(b.x+b.sz*.5,b.y-Math.abs(wy)*.75,b.x+b.sz*1.5,b.y+wy);
    cx.stroke();
  });
}

function drawCity(t,reflection=false){
  const pal=skyPal(t);
  const br=(pal.bot[0]+pal.bot[1]+pal.bot[2])/3;
  const al=reflection?.32:(br>130?.82:.97);
  const base=`rgba(6,8,16,${al})`;
  cx.fillStyle=base;cx.fillRect(0,HZ-2,W,4);
  const byCx=W/2,byY=HZ;

  cx.fillStyle=`rgba(10,15,26,${al*.55})`;
  cityBuildings.forEach(b=>{
    cx.fillRect(b.x,byY-b.h,b.w,b.h);
  });
  cx.fillStyle=base;

  const dome=(x,y,r,dh)=>{
    cx.beginPath();cx.moveTo(x-r,y);
    cx.bezierCurveTo(x-r,y-dh*.56,x-r*.26,y-dh,x,y-dh*1.06);
    cx.bezierCurveTo(x+r*.26,y-dh,x+r,y-dh*.56,x+r,y);
    cx.fill();
    cx.fillRect(x-1,y-dh*1.06-9,2,9);
    cx.beginPath();cx.arc(x,y-dh*1.06-10,2.6,0,Math.PI*2);cx.fill();
  };
  const minaret=(x,y,mh)=>{
    cx.fillRect(x-4,y-mh+26,8,mh-26);
    cx.fillRect(x-9,y-mh+46,18,4);
    cx.fillRect(x-6.5,y-mh+17,13,3.5);
    cx.beginPath();cx.moveTo(x-4.5,y-mh+17);cx.lineTo(x+4.5,y-mh+17);cx.lineTo(x,y-mh);cx.fill();
    cx.fillRect(x-.5,y-mh-8,1,8);
    cx.beginPath();cx.arc(x,y-mh-9,1.6,0,Math.PI*2);cx.fill();
  };

  dome(byCx,byY-56,78,84);dome(byCx-58,byY-36,42,48);dome(byCx+58,byY-36,42,48);
  dome(byCx-90,byY-26,27,32);dome(byCx+90,byY-26,27,32);
  cx.fillRect(byCx-104,byY-56,208,56);
  minaret(byCx-114,byY,228);minaret(byCx+114,byY,228);
  minaret(byCx-146,byY,188);minaret(byCx+146,byY,188);

  const lx2=byCx-358;
  dome(lx2,byY-36,54,58);cx.fillRect(lx2-64,byY-36,128,36);
  minaret(lx2-74,byY,158);minaret(lx2+74,byY,158);

  const rx2=byCx+358;
  cx.fillRect(rx2-26,byY-128,52,128);cx.fillRect(rx2-32,byY-138,64,10);
  cx.beginPath();cx.moveTo(rx2-26,byY-138);cx.lineTo(rx2+26,byY-138);cx.lineTo(rx2,byY-192);cx.fill();

  cityTrees.forEach(tr=>{
    if(tr.variation<.5){
      cx.beginPath();cx.ellipse(byCx+tr.dx,byY-tr.s*.56,tr.s*.32,tr.s*.80,tr.tilt,0,Math.PI*2);cx.fill();
    }else{
      cx.beginPath();
      cx.moveTo(byCx+tr.dx,byY-tr.s*1.1);
      cx.lineTo(byCx+tr.dx-tr.s*.4,byY);
      cx.lineTo(byCx+tr.dx+tr.s*.4,byY);cx.fill();
    }
  });

  if(!reflection&&(t>17.8||t<6.8)){
    let wa=1;
    if(t>=5.6&&t<=6.8)wa=1-ss(5.6,6.8,t);
    if(t>=17.8&&t<=19.2)wa=ss(17.8,19.2,t);
    wa=clamp(wa,0,1);

    cx.fillStyle=`rgba(255,185,72,${wa*.88})`;
    for(let i=-3;i<=3;i++){
      cx.beginPath();cx.arc(byCx+i*24,byY-31,3.6,Math.PI,0);
      cx.fillRect(byCx+i*24-3.6,byY-31,7.2,10);cx.fill();
    }
    for(let y=byY-26;y>byY-112;y-=22)cx.fillRect(rx2-5,y,9,13);

    cityLights.forEach(l=>{
      if(l.onChance>.72)return;
      const tw=.55+.45*Math.sin(tick*l.sp+l.ph);
      cx.fillStyle=`rgba(255,${l.w|0},45,${wa*l.ba*tw})`;
      cx.fillRect(l.x,byY-l.dy,3.5,5.5);
    });

    if((t<5||t>21)&&wa>.3){
      for(let i=-3;i<=3;i++){
        const gx=cx.createRadialGradient(byCx+i*24,byY-31,0,byCx+i*24,byY-31,28);
        gx.addColorStop(0,`rgba(255,160,45,${wa*.14})`);gx.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=gx;cx.beginPath();cx.arc(byCx+i*24,byY-31,28,0,Math.PI*2);cx.fill();
      }

      const lpg=cx.createLinearGradient(0,byY-60,0,byY);
      lpg.addColorStop(0,'rgba(255,175,60,0)');
      lpg.addColorStop(1,`rgba(255,140,40,${wa*.08})`);
      cx.fillStyle=lpg;cx.fillRect(0,byY-60,W,60);
    }
  }
}

function drawOcean(t){
  const pal=skyPal(t);
  const sun=sunPos(t);
  const moon=moonPos(t);
  const light=sun||moon;
  const isNight=t<5||t>19.8;

  const wt=pal.bot.map(c=>c*(isNight?.22:.28));
  const wb=pal.top.map(c=>c*(isNight?.14:.18));
  const og=cx.createLinearGradient(0,HZ,0,H);
  og.addColorStop(0,rgb(wt));og.addColorStop(.5,rgb(lC(wt,wb,.45)));og.addColorStop(1,rgb(wb));
  cx.fillStyle=og;cx.fillRect(0,HZ,W,H-HZ);

  cx.save();cx.translate(0,HZ*2);cx.scale(1,-1);
  cx.globalAlpha=.28;drawCity(t,true);cx.globalAlpha=1;
  cx.restore();

  const sb=cx.createLinearGradient(0,HZ,0,H);
  sb.addColorStop(0,`rgba(${wt[0]|0},${wt[1]|0},${wt[2]|0},.72)`);
  sb.addColorStop(.35,`rgba(${wt[0]|0},${wt[1]|0},${wt[2]|0},.38)`);
  sb.addColorStop(1,`rgba(${wb[0]|0},${wb[1]|0},${wb[2]|0},.15)`);
  cx.fillStyle=sb;cx.fillRect(0,HZ,W,H-HZ);

  const wt2=tick*.0088;

  if(light&&light.alt>-.12){
    const lx=light.x;
    const li=ss(-.12,.35,light.alt);
    const isSun=!!sun;
    cx.globalCompositeOperation='screen';
    for(let i=0;i<350;i++){
      const z=Math.pow(Math.random(),1.75);
      const wy=HZ+z*(H-HZ);
      const spread=16+z*490;
      const off=(P.n(wy*.045,wt2)-.5)*spread;
      const wx=lx+off+(Math.random()-.5)*spread*.45;
      const wl=3.5+Math.random()*38*(1+z*1.2);
      const wth=.38+z*1.6;
      const alv=(1-z)*li*(.15+Math.random()*.65);
      if(alv<=0)continue;
      if(isSun)cx.fillStyle=`rgba(255,${lerp(138,255,li)|0},${lerp(38,192,li)|0},${alv})`;
      else cx.fillStyle=`rgba(165,210,255,${alv*.45})`;
      cx.fillRect(wx-wl/2,wy,wl,wth);
    }
    cx.globalCompositeOperation='source-over';
  }

  if(isNight){
    cx.globalCompositeOperation='screen';
    for(let i=0;i<40;i++){
      const bx=Math.random()*W,by=HZ+Math.random()*(H-HZ);
      const bg=cx.createRadialGradient(bx,by,0,bx,by,8+Math.random()*22);
      bg.addColorStop(0,`rgba(48,255,180,${.02+Math.random()*.05})`);
      bg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=bg;cx.beginPath();cx.arc(bx,by,30,0,Math.PI*2);cx.fill();
    }
    cx.globalCompositeOperation='source-over';
  }

  for(let i=0;i<20;i++){
    const z=i/20;
    const wy=HZ+Math.pow(z,1.38)*(H-HZ);
    const wa=.035+z*.082;
    const wFreq=.0088+z*.003;
    cx.beginPath();cx.moveTo(0,wy);
    for(let x2=0;x2<=W;x2+=16){
      const yw=wy+Math.sin(x2*wFreq+wt2*(1+z*.75)+i*.42)*( 1.6+z*7.2)+Math.sin(x2*.02+wt2*.65+i)*(z*2.2)+P.n(x2*.008+wt2*.05,z+i*.1)*z*3.5;
      cx.lineTo(x2,yw);
    }
    cx.lineTo(W,H);cx.lineTo(0,H);
    let wr,wg,wb2;
    if(isNight){wr=6;wg=10;wb2=24;}else{wr=255;wg=255;wb2=255;}
    cx.fillStyle=`rgba(${wr},${wg},${wb2},${isNight?wa*.38:wa})`;cx.fill();
  }

  if(isNight){
    for(let i=0;i<6;i++){
      const fx=Math.random()*W;
      const fg2=cx.createLinearGradient(fx-30,HZ,fx+30,HZ);
      fg2.addColorStop(0,'rgba(255,255,255,0)');
      fg2.addColorStop(.5,`rgba(255,255,255,${.015+Math.random()*.025})`);
      fg2.addColorStop(1,'rgba(255,255,255,0)');
      cx.fillStyle=fg2;cx.fillRect(fx-30,HZ,60,H-HZ);
    }
  }
}

function getState(now){
  const tz=now.getTimezoneOffset()*60000;
  const todayStr=new Date(now-tz).toISOString().split('T')[0];
  const today=TAKVIM.find(d=>d.tarih===todayStr);
  if(!today){
    const future=TAKVIM.filter(d=>new Date(`${d.tarih}T00:00:00`)>now);
    if(future.length){const nd=future[0];return{msg:'İLK SAHURA KALAN',target:new Date(`${nd.tarih}T${nd.imsak}:00`),imsak:nd.imsak,iftar:nd.aksam,date:nd.tarih};}
    return{msg:'RAMAZAN SONA ERDİ',target:null,imsak:'--:--',iftar:'--:--',date:'----'};
  }
  const ti=new Date(`${todayStr}T${today.imsak}:00`);
  const tf=new Date(`${todayStr}T${today.aksam}:00`);
  const tf1h=new Date(tf.getTime()+3600000);
  if(now<ti)return{msg:'SAHURUN BİTMESİNE KALAN',target:ti,imsak:today.imsak,iftar:today.aksam,date:todayStr};
  if(now<tf)return{msg:'İFTARA KALAN SÜRE',target:tf,imsak:today.imsak,iftar:today.aksam,date:todayStr};
  if(now<tf1h)return{msg:'HAYIRLI İFTARLAR 🌙',target:null,imsak:today.imsak,iftar:today.aksam,date:todayStr};
  const tmrStr=new Date(now-tz+86400000).toISOString().split('T')[0];
  const tmr=TAKVIM.find(d=>d.tarih===tmrStr);
  if(tmr)return{msg:'SAHURUN BİTMESİNE KALAN',target:new Date(`${tmrStr}T${tmr.imsak}:00`),imsak:tmr.imsak,iftar:tmr.aksam,date:tmrStr};
  return{msg:'RAMAZAN SONA ERDİ',target:null,imsak:'--:--',iftar:'--:--',date:'----'};
}

    const d=Math.max(0,s.target-now);
    const hv=Math.floor(d/3600000),mv=Math.floor(d%3600000/60000),sv=Math.floor(d%60000/1000);
    document.getElementById('el-timer').textContent=`${String(hv).padStart(2,'0')}:${String(mv).padStart(2,'0')}:${String(sv).padStart(2,'0')}`;
  }else{
    document.getElementById('el-timer').textContent='00:00:00';
  }
}
setInterval(updateUI,250);
updateUI();
</script>
</body>
</html>
