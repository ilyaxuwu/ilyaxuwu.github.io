<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astral Production</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Segoe UI, sans-serif;
}

body {
  background: #050816;
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top, #3f51ff33 0%, transparent 50%),
    radial-gradient(circle at bottom, #00bfff22 0%, transparent 45%);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
  z-index: -1;
}

header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero {
  max-width: 900px;
}

.logo {
  font-size: 70px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(90deg, #6f7cff, #2cf5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}

.hero h2 {
  font-size: 28px;
  margin-bottom: 15px;
  color: #dfe5ff;
}

.hero p {
  font-size: 18px;
  color: #aab2d5;
  line-height: 1.7;
}

.hero-btn {
  margin-top: 35px;
  padding: 15px 40px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  background: linear-gradient(135deg, #5865F2, #00C6FF);
  color: white;
  transition: .3s;
}

.hero-btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px #4d7cff55;
}

section {
  padding: 80px 8%;
}

.title {
  font-size: 40px;
  margin-bottom: 40px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
}

.card {
  background: rgba(255, 255, 255, .05);
  border: 1px solid rgba(255, 255, 255, .08);
  padding: 25px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  transition: .35s;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #5c7cff;
}

.card h3 {
  margin-bottom: 12px;
  font-size: 24px;
}

.card p {
  color: #bcc4e5;
  line-height: 1.6;
  margin-bottom: 18px;
  flex-grow: 1; /* Kart boylarının eşit kalmasına yardımcı olur */
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

.tag {
  padding: 7px 14px;
  background: #4f68ff22;
  border: 1px solid #5f74ff;
  border-radius: 100px;
  font-size: 13px;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.status {
  padding: 8px 16px;
  background: #1eff7a22;
  border: 1px solid #2aff84;
  border-radius: 100px;
  font-size: 13px;
}

.project-link {
  color: #2cf5ff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  transition: 0.3s;
}

.project-link:hover {
  color: #6f7cff;
  transform: translateX(3px);
}

footer {
  padding: 50px;
  text-align: center;
  color: #9aa4cf;
  border-top: 1px solid rgba(255, 255, 255, .08);
  margin-top: 70px;
}

html {
  scroll-behavior: smooth;
}
</style>
</head>

<body>

<header>
  <div class="hero">
    <div class="logo">𝓐𝓼𝓽𝓻𝓪𝓵 𝓟𝓻𝓸𝓭𝓾𝓬𝓽𝓲𝓸𝓷</div>
    <h2>Making Useful software & Creative ideas.</h2>
    <p>
      Astral Production is an independent development studio focused on desktop applications,
      web techs, automation, experimental software, useful techs and more.
    </p>
    <button class="hero-btn" onclick="document.getElementById('portfolio').scrollIntoView()">
      Explore Projects
    </button>
  </div>
</header>

<section id="portfolio">
  <div class="title">Featured Projects</div>
  <div class="projects" id="projects"></div>
</section>

<footer>
  © 2026 Astral Production<br>
  By Ilyax.
</footer>

<script>
const projects = [
  {
    name: "ahk-builder",
    description: "Allows you to do Autohotkey macros without writing a single ahk code.",
    status: "Active",
    tags: ["Golang", "Frontend", "Ahk v1 / v2"],
    link: "https://github.com/astral-production/ahk-builder"
  },
  {
    name: "Danser-go",
    description: "A custom osu! client written in Go; a performance-oriented project equipped with specialized technologies. (Written by Wieku and enhanced by ilyax)",
    status: "In Development",
    tags: ["Go", "Wgpu", "osu!", "Performance", "cursordance", "Replay View/Render", "Custom"],
    link: "" 
  },
  {
    name: "sploop-astral",
    description: "A cheat designed and created for Sploop.io. It is one of the best cheats in the world, specially optimized..",
    status: "Active",
    tags: ["Cheat", "Sploop", "JS", "TamperMonkey"],
    link: "https://github.com/astral-production/sploop-astral"
  },
  {
    name: "Xiro",
    description: "A completely free bot that doesn’t charge anything. Equipped with proprietary technologies, it reduces costs by a factor of 1,000. Every other known bot has to pay up to $30,000 per month on a 100,000-member server. However, the bot we designed cuts that cost down to $300 and offers better features than other bots. ",
    status: "In Development",
    tags: ["Discord", "Node.js", "Automation", "Analyzer", "AntiNuke", "Anti-scam Image"],
    link: "" 
  },
];

const container = document.getElementById("projects");

projects.forEach(project => {
  
  // Link varsa HTML çıktısını oluştur, yoksa boş bırak
  const linkHtml = project.link 
    ? `<a href="${project.link}" target="_blank" class="project-link">Explore ↗</a>` 
    : '';

  container.innerHTML += `
    <div class="card">
      <h3>${project.name}</h3>
      <p>${project.description}</p>
      
      <div class="tags">
        ${project.tags.map(tag => `<div class="tag">${tag}</div>`).join("")}
      </div>
      
      <div class="card-footer">
        <div class="status">${project.status}</div>
        ${linkHtml}
      </div>
    </div>
  `;
});
</script>

</body>
</html>
